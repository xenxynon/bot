<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fileserv / sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 32px;
  background: var(--bg);
}

.login-wrap { width: 100%; max-width: 360px; }

.login-logo {
  width: 52px; height: 52px; border-radius: 16px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin-bottom: 32px;
  box-shadow: 0 8px 24px color-mix(in srgb, var(--accent-1) 30%, transparent);
}

.login-heading {
  font-size: 28px; font-weight: 600;
  letter-spacing: -.03em; color: var(--text);
  margin-bottom: 6px;
}
.login-sub {
  font-size: 14px; color: var(--sub);
  margin-bottom: 32px;
}

.field-label {
  font-size: 12px; font-weight: 500;
  color: var(--sub); margin-bottom: 8px; display: block;
}

.field-input {
  width: 100%; height: 48px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: inherit; font-size: 15px;
  padding: 0 16px; outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none; letter-spacing: .05em;
}
.field-input:focus {
  border-color: var(--accent-1);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-1) 15%, transparent);
}
.field-input::placeholder { color: var(--subtle); letter-spacing: normal; }

.submit-btn {
  width: 100%; height: 48px; margin-top: 12px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  color: #fff; border: none; border-radius: 10px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .15s, transform .1s;
  box-shadow: 0 4px 16px color-mix(in srgb, var(--accent-1) 30%, transparent);
}
.submit-btn:hover { opacity: .9; }
.submit-btn:active { transform: scale(.98); opacity: .8; }

.error {
  font-size: 12px; color: var(--red);
  margin-top: 12px; padding: 10px 14px;
  border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
  border-radius: 8px;
  background: color-mix(in srgb, var(--red) 6%, transparent);
}

.login-footer {
  margin-top: 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-hint { font-size: 12px; color: var(--subtle); font-style: italic; min-height: 16px; }
.theme-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--sub); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: border-color .1s, color .1s;
}
.theme-toggle:hover { border-color: var(--sub); color: var(--text); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">📦</div>
  <h1 class="login-heading">Welcome back</h1>
  <p class="login-sub">Sign in to access fileserv</p>

  <form method="POST" action="/login">
    <label class="field-label" for="pw">Password</label>
    <input class="field-input" id="pw" type="password" name="pass"
           autofocus autocomplete="current-password" placeholder="Enter password">
    <button class="submit-btn" type="submit">Continue →</button>
    {{error}}
  </form>

  <div class="login-footer">
    <span class="footer-hint" id="hint"></span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">◐</button>
  </div>
</div>

<script src="/static/theme.js"></script>
<script>
const HINTS = [
  "tip: it's not '1234'",
  "the server is judging you",
  "knock knock... access denied",
  "your files await, nervously",
  "what's the magic word?",
  "brute force not recommended",
  "the password is not 'admin'",
];
const hint = document.getElementById('hint');
let shown = false, idleTimer;

function showHint() {
  if (shown) return; shown = true;
  hint.textContent = HINTS[Math.floor(Math.random() * HINTS.length)];
  setTimeout(() => { hint.textContent = ''; shown = false; resetIdle(); }, 5000);
}
function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showHint, 8000);
}
document.addEventListener('mousemove', resetIdle);
document.addEventListener('keydown', resetIdle);
resetIdle();

let wrongCount = parseInt(sessionStorage.getItem('wc') || '0');
if (document.querySelector('.error')) {
  wrongCount++;
  sessionStorage.setItem('wc', wrongCount);
  if (wrongCount === 3) hint.textContent = "three strikes... you good?";
  if (wrongCount >= 5) hint.textContent = "at this point just text them";
}
</script>
</body>
</html>
