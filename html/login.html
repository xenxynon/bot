<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fileserv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 32px;
}

.login-wrap { width: 100%; max-width: 340px; }

.login-wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px; font-weight: 500;
  color: var(--text); letter-spacing: -.02em;
  margin-bottom: 8px;
}
.login-wordmark span { color: var(--accent); }

.login-sub {
  font-size: 13px; color: var(--muted);
  margin-bottom: 32px;
}

.field-label {
  font-size: 11px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px; display: block;
  font-family: 'IBM Plex Mono', monospace;
}

.field-input {
  width: 100%; height: 44px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 14px;
  padding: 0 14px; outline: none;
  transition: border-color .12s;
  -webkit-appearance: none; letter-spacing: .04em;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--muted); letter-spacing: normal; font-family: 'IBM Plex Sans', sans-serif; }

.submit-btn {
  width: 100%; height: 44px; margin-top: 10px;
  background: var(--accent);
  color: #fff; border: none; border-radius: 8px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .12s, transform .1s;
  letter-spacing: .01em;
}
.submit-btn:hover { opacity: .88; }
.submit-btn:active { transform: scale(.98); }

.error {
  font-size: 12px; color: var(--red);
  margin-top: 10px; padding: 10px 12px;
  border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
  border-radius: 6px;
  background: color-mix(in srgb, var(--red) 6%, transparent);
  font-family: 'IBM Plex Mono', monospace;
}

.login-footer {
  margin-top: 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-hint { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; min-height: 16px; }
.theme-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--sub); width: 30px; height: 30px; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: border-color .1s, color .1s;
}
.theme-toggle:hover { border-color: var(--border-strong); color: var(--text); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-wordmark">file<span>serv</span></div>
  <p class="login-sub">Enter your password to continue</p>

  <form method="POST" action="/login">
    <label class="field-label" for="pw">Password</label>
    <input class="field-input" id="pw" type="password" name="pass"
           autofocus autocomplete="current-password" placeholder="••••••••">
    <button class="submit-btn" type="submit">Continue →</button>
    {{error}}
  </form>

  <div class="login-footer">
    <span class="footer-hint" id="hint"></span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">◐</button>
  </div>
</div>

<script src="/static/theme.js"></script>
<script>
const HINTS = [
  "it's not '1234'",
  "knock knock...",
  "the server is judging you",
  "brute force not recommended",
  "what's the magic word?",
];
const hint = document.getElementById('hint');
let shown = false, idleTimer;

function showHint() {
  if (shown) return; shown = true;
  hint.textContent = HINTS[Math.floor(Math.random() * HINTS.length)];
  setTimeout(() => { hint.textContent = ''; shown = false; resetIdle(); }, 5000);
}
function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showHint, 8000);
}
document.addEventListener('mousemove', resetIdle);
document.addEventListener('keydown', resetIdle);
resetIdle();

let wrongCount = parseInt(sessionStorage.getItem('wc') || '0');
if (document.querySelector('.error')) {
  wrongCount++;
  sessionStorage.setItem('wc', wrongCount);
  if (wrongCount >= 3) hint.textContent = 'three strikes...';
  if (wrongCount >= 5) hint.textContent = 'just text them instead';
}
</script>
</body>
</html>
