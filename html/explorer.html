<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>fileserv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
:root {
  --nav-h: 48px;
  --bar-h: 36px;
  --toolbar-h: 38px;
  --radius: 8px;
  --radius-sm: 6px;
  --t: .12s ease;
  --panel-w: 280px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  padding-bottom: var(--bar-h);
}

/* ── Nav ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
}

.nav-brand {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 500;
  color: var(--text); cursor: default;
  user-select: none; flex-shrink: 0;
  letter-spacing: -.02em;
}
.nav-brand span { color: var(--accent); }

.breadcrumb {
  display: flex; align-items: center; gap: 2px;
  font-size: 11px; color: var(--sub); flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  overflow: hidden; max-width: 200px;
}
.bc-sep { color: var(--border-strong); margin: 0 1px; }
.bc-item {
  background: none; border: none; color: var(--sub);
  cursor: pointer; font-family: inherit; font-size: 11px;
  padding: 2px 4px; border-radius: 4px;
  transition: color var(--t), background var(--t);
  white-space: nowrap;
}
.bc-item:hover { color: var(--text); background: var(--surface); }
.bc-item.current { color: var(--text); cursor: default; }

.search-wrap {
  flex: 1; min-width: 0; max-width: 300px; margin: 0 auto;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  stroke: var(--sub); pointer-events: none;
}
#q {
  width: 100%; height: 30px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); outline: none;
  font-family: 'IBM Plex Sans', inherit; font-size: 13px; color: var(--text);
  padding: 0 10px 0 30px;
  transition: border-color var(--t);
}
#q:focus { border-color: var(--accent); }
#q::placeholder { color: var(--muted); }

.nav-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--sub); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t); flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface); }
.icon-btn:active { transform: scale(.92); }

.btn {
  height: 30px; padding: 0 12px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid; display: flex; align-items: center; gap: 6px;
  transition: all var(--t); white-space: nowrap;
  -webkit-tap-highlight-color: transparent; letter-spacing: .01em;
}
.btn-ghost { background: transparent; border-color: var(--border); color: var(--sub); }
.btn-ghost:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .88; }
.btn-danger { background: var(--red); border-color: var(--red); color: #fff; }

/* ── Toolbar ── */
.toolbar {
  height: var(--toolbar-h);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
  background: var(--bg);
  flex-shrink: 0;
}

/* Category tabs — grouped, not per-extension */
.cat-tabs { display: flex; align-items: center; gap: 2px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
.cat-tabs::-webkit-scrollbar { display: none; }

.ctab {
  height: 24px; padding: 0 9px; border-radius: var(--radius-sm);
  background: transparent; border: 1px solid transparent;
  color: var(--sub); font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all var(--t);
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.ctab:hover { color: var(--text); background: var(--surface); }
.ctab.on { color: var(--text); background: var(--surface); border-color: var(--border); }
.ctab .n {
  font-size: 9px; color: var(--muted);
  background: var(--surface-2); padding: 0 3px;
  border-radius: 3px; font-family: inherit;
}
.ctab.on .n { color: var(--sub); }

.toolbar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

/* Sort dropdown */
.sort-wrap { position: relative; flex-shrink: 0; }
.sort-toggle {
  height: 24px; padding: 0 8px; border-radius: var(--radius-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--sub); font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  transition: all var(--t); white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.sort-toggle:hover, .sort-toggle.open { border-color: var(--border-strong); color: var(--text); background: var(--surface); }
.sort-dropdown {
  position: absolute; right: 0; top: calc(100% + 4px);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px;
  min-width: 130px; z-index: 200;
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
  display: none;
}
.sort-dropdown.open { display: block; }
.sort-opt {
  width: 100%; height: 28px; padding: 0 8px; border-radius: var(--radius-sm);
  background: transparent; border: none; text-align: left;
  color: var(--sub); font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; cursor: pointer; display: flex; align-items: center;
  justify-content: space-between; gap: 8px; transition: all var(--t);
}
.sort-opt:hover { background: var(--surface); color: var(--text); }
.sort-opt.on { color: var(--text); }
.sort-dir { font-size: 10px; color: var(--muted); }

/* ── File table ── */
.table-wrap { width: 100%; }

.thead {
  display: grid;
  grid-template-columns: 1fr 76px 132px 80px;
  align-items: center; height: 32px; padding: 0 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: calc(var(--nav-h) + var(--toolbar-h)); z-index: 10;
}
.table-wrap.admin .thead,
.table-wrap.admin .frow { grid-template-columns: 1fr 76px 132px 108px; }

.th {
  font-size: 10px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--muted); background: transparent; border: none;
  padding: 0; cursor: pointer;
  display: flex; align-items: center; gap: 3px;
  font-family: 'IBM Plex Mono', monospace;
  transition: color var(--t);
  -webkit-tap-highlight-color: transparent;
}
.th:hover { color: var(--sub); }
.th.on { color: var(--text); }
.th-r { justify-content: flex-end; }
.th-c { justify-content: center; cursor: default; }

/* ── File rows ── */
.frow {
  display: grid;
  grid-template-columns: 1fr 76px 132px 80px;
  align-items: center; min-height: 48px; padding: 0 14px;
  border-bottom: 1px solid var(--border-faint);
  transition: background var(--t);
}
.frow:last-child { border-bottom: none; }
.frow:hover { background: var(--surface); }
.frow.dir-row { cursor: pointer; }

.fname-cell { display: flex; align-items: center; gap: 9px; min-width: 0; }

.file-badge {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; font-weight: 500;
  letter-spacing: .02em; text-transform: uppercase;
}
.fb-arc  { background: var(--surface-2); color: var(--sub); }
.fb-apk  { background: color-mix(in srgb, #22c55e 12%, transparent); color: #16a34a; }
.fb-img  { background: color-mix(in srgb, #a855f7 12%, transparent); color: #9333ea; }
.fb-vid  { background: color-mix(in srgb, #ec4899 12%, transparent); color: #db2777; }
.fb-aud  { background: color-mix(in srgb, #f97316 12%, transparent); color: #ea580c; }
.fb-doc  { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
.fb-dir  { background: color-mix(in srgb, #f59e0b 12%, transparent); color: #d97706; }
.fb-def  { background: var(--surface-2); color: var(--muted); }

[data-theme="dark"] .fb-apk { color: #4ade80; }
[data-theme="dark"] .fb-img { color: #c084fc; }
[data-theme="dark"] .fb-vid { color: #f472b6; }
[data-theme="dark"] .fb-aud { color: #fb923c; }
[data-theme="dark"] .fb-doc { color: var(--accent); }
[data-theme="dark"] .fb-dir { color: #fbbf24; }

.fname-info { min-width: 0; flex: 1; }
.fname-main {
  font-size: 13px; font-weight: 500; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.fname-sub {
  font-size: 11px; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; margin-top: 1px;
}
.fname-meta { font-size: 11px; color: var(--sub); margin-top: 1px; display: none; }

.fsize {
  font-size: 12px; color: var(--sub);
  text-align: right; white-space: nowrap;
  font-variant-numeric: tabular-nums;
  font-family: 'IBM Plex Mono', monospace;
}
.fdate {
  font-size: 11px; color: var(--muted); white-space: nowrap;
  font-variant-numeric: tabular-nums;
  font-family: 'IBM Plex Mono', monospace;
  padding-left: 8px;
}

.fact { display: flex; align-items: center; justify-content: flex-end; gap: 3px; }

.act-btn {
  width: 26px; height: 26px; border-radius: var(--radius-sm);
  background: transparent; border: 1px solid transparent;
  color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t); flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.act-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface-2); }
.act-btn:active { transform: scale(.88); }
.act-btn.ok  { color: var(--green); border-color: var(--border); background: color-mix(in srgb, var(--green) 8%, transparent); pointer-events: none; }
.act-btn.armed { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, transparent); background: color-mix(in srgb, var(--red) 8%, transparent); }
.act-btn.danger:hover { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, transparent); background: color-mix(in srgb, var(--red) 8%, transparent); }

/* ── Empty ── */
.empty { padding: 80px 24px; text-align: center; }
.empty-icon { width: 36px; height: 36px; margin: 0 auto 14px; opacity: .2; }
.empty-msg { font-size: 13px; color: var(--sub); font-family: 'IBM Plex Mono', monospace; }

/* ── Status bar ── */
.statusbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bar-h);
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center;
  padding: 0 14px; gap: 14px; z-index: 50;
}
.sb-stat { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; }
.sb-stat b { color: var(--sub); font-weight: 500; }
.sb-egg {
  margin-left: auto; font-size: 11px; color: var(--accent);
  font-style: italic; font-family: 'IBM Plex Mono', monospace;
  opacity: 0; transition: opacity .5s;
  cursor: default; user-select: none;
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sb-egg.visible { opacity: 1; }
.sb-egg:hover { opacity: 0.6; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 46px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text); color: var(--bg);
  font-size: 12px; font-weight: 500;
  padding: 6px 13px; border-radius: var(--radius-sm);
  white-space: nowrap; z-index: 999; pointer-events: none; opacity: 0;
  transition: opacity .12s, transform .18s cubic-bezier(.34,1.4,.64,1);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .01em;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Side panel ── */
.side-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: var(--panel-w);
  background: var(--bg); border-left: 1px solid var(--border);
  z-index: 300; display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .2s cubic-bezier(.4,0,.2,1);
  box-shadow: -8px 0 32px rgba(0,0,0,.08);
}
.side-panel.open { transform: none; }
.side-overlay {
  position: fixed; inset: 0; z-index: 290;
  background: color-mix(in srgb, var(--bg) 40%, transparent);
  backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.side-overlay.open { opacity: 1; pointer-events: auto; }

.sp-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sp-title { font-size: 12px; font-weight: 600; color: var(--text); font-family: 'IBM Plex Mono', monospace; letter-spacing: .02em; }
.sp-close {
  width: 24px; height: 24px; border-radius: var(--radius-sm);
  background: none; border: 1px solid var(--border);
  color: var(--sub); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t); line-height: 1;
}
.sp-close:hover { border-color: var(--border-strong); color: var(--text); }

.sp-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 16px; }

.sp-section { display: flex; flex-direction: column; gap: 8px; }
.sp-section-title {
  font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); font-family: 'IBM Plex Mono', monospace;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}

/* Upload in side panel */
.upload-drop {
  padding: 20px 14px; border: 1px dashed var(--border); border-radius: var(--radius-sm);
  text-align: center; cursor: pointer; color: var(--sub); font-size: 12px;
  transition: border-color var(--t), background var(--t);
  user-select: none;
}
.upload-drop:hover, .upload-drop.drag-over {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 4%, transparent);
}
.upload-drop .drop-icon { margin-bottom: 6px; opacity: .5; }
.upload-drop .drop-hint { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

.upload-list { display: flex; flex-direction: column; gap: 6px; }
.upload-item { padding: 8px 10px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.upload-iname { font-size: 11px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; }
.upload-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.upload-bar   { height: 100%; background: var(--accent); width: 0%; transition: width .1s; }
.upload-imeta { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 3px; }

/* Torrent in side panel */
.torrent-input {
  width: 100%; height: 64px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 8px 10px; resize: none; outline: none;
  transition: border-color var(--t);
}
.torrent-input:focus { border-color: var(--accent); }
.torrent-input::placeholder { color: var(--muted); font-family: inherit; }

.torrent-drop {
  padding: 12px; border: 1px dashed var(--border); border-radius: var(--radius-sm);
  text-align: center; cursor: pointer; color: var(--sub); font-size: 11px;
  transition: border-color var(--t), background var(--t);
  font-family: 'IBM Plex Mono', monospace;
  user-select: none;
}
.torrent-drop:hover, .torrent-drop.drag-over {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 4%, transparent);
}

/* Admin in side panel */
.admin-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.admin-label { font-size: 12px; color: var(--sub); font-family: 'IBM Plex Mono', monospace; }
.toggle-switch {
  width: 30px; height: 17px; border-radius: 100px;
  background: var(--border); cursor: pointer; border: none;
  position: relative; transition: background var(--t);
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after {
  content: ''; position: absolute;
  width: 11px; height: 11px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: left var(--t);
  box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.toggle-switch.on::after { left: 16px; }

/* ── Rename overlay (kept as modal since it's a simple single interaction) ── */
.overlay {
  position: fixed; inset: 0; z-index: 400;
  background: color-mix(in srgb, var(--bg) 60%, transparent);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; animation: fadeIn .12s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.panel {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); width: min(400px, 100%);
  display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
  animation: slideUp .18s cubic-bezier(.34,1,.64,1);
}
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }

.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 12px; font-weight: 600; color: var(--text); font-family: 'IBM Plex Mono', monospace; }
.panel-close {
  width: 24px; height: 24px; border-radius: var(--radius-sm);
  background: none; border: 1px solid var(--border);
  color: var(--sub); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t); line-height: 1;
}
.panel-close:hover { border-color: var(--border-strong); color: var(--text); }

.rename-wrap { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.rename-input {
  width: 100%; height: 38px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  padding: 0 10px; outline: none;
  transition: border-color var(--t);
}
.rename-input:focus { border-color: var(--accent); }
.rename-actions { display: flex; gap: 8px; }

/* ── Mobile ── */
@media (max-width: 600px) {
  .breadcrumb { display: none; }
  .nav { padding: 0 10px; gap: 8px; }
  .search-wrap { max-width: none; }
  .toolbar { padding: 0 10px; }
  .thead { display: none; }
  .frow {
    grid-template-columns: 1fr auto !important;
    align-items: start; min-height: auto;
    padding: 10px 10px;
  }
  .fname-main { white-space: normal; word-break: break-word; }
  .fact { align-items: flex-start; padding-top: 2px; }
  .fsize, .fdate { display: none; }
  .fname-meta { display: block !important; }
  .fname-sub { display: none; }
  .act-btn { width: 32px; height: 32px; }
  .statusbar { padding: 0 10px; gap: 8px; }
  .sb-egg { max-width: 140px; font-size: 10px; }
  .side-panel { width: 100%; }
}
@media (max-width: 380px) {
  .btn span { display: none; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand" id="brand">file<span>serv</span></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="search-wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="q" type="search" placeholder="Search…" autocomplete="off" spellcheck="false">
  </div>
  <div class="nav-actions">
    <button class="icon-btn" onclick="load()" title="Refresh">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">◐</button>
    <button class="icon-btn" id="panel-btn" onclick="openPanel()" title="Actions" style="display:none">

<script src="/static/theme.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let _all = [], _dirs = [], _cat = null, _isAdmin = false, _canDelete = false, _canWrite = false;
let _torrentEnabled = false;
let _sort = { col: 'mtime', dir: -1 };
let _path = '';
let _renamingFile = null;

// ── Category definitions ───────────────────────────────────────────────────────
const CATS = [
  { id: 'archive', label: 'archives', exts: new Set(['zip','gz','xz','zst','tar','7z','bz2','lz4','br','rar']) },
  { id: 'image',   label: 'images',   exts: new Set(['jpg','jpeg','png','gif','webp','svg','bmp','avif','ico']) },
  { id: 'video',   label: 'video',    exts: new Set(['mp4','mkv','avi','mov','webm','flv','m4v','ts']) },
  { id: 'audio',   label: 'audio',    exts: new Set(['mp3','flac','aac','wav','ogg','m4a','opus']) },
  { id: 'doc',     label: 'docs',     exts: new Set(['txt','log','md','json','xml','sh','yaml','toml','cfg','py','js','ts','html','css','pdf','doc','docx','xls','xlsx','csv']) },
];

function catForFile(name) {
  const e = gext(name);
  for (const c of CATS) if (c.exts.has(e)) return c.id;
  return 'other';
}

// ── Utils ──────────────────────────────────────────────────────────────────────
const fsize = b => {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB']; let i = 0;
  while (b >= 1024 && i < 4) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + '\u202f' + u[i];
};

const fdate = ts => {
  const d = new Date(ts * 1000), n = new Date();
  if (d.toDateString() === n.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (n - d < 7 * 86400e3)
    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  return d.toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
};

const gext = n => { const i = n.lastIndexOf('.'); return i > 0 ? n.slice(i+1).toLowerCase() : ''; };

const badgeForFile = name => {
  const e = gext(name);
  const cat = catForFile(name);
  if (cat === 'archive') return [e || 'arc', 'fb-arc'];
  if (cat === 'image')   return [e.slice(0,4) || 'img', 'fb-img'];
  if (cat === 'video')   return [e.slice(0,4) || 'vid', 'fb-vid'];
  if (cat === 'audio')   return [e.slice(0,4) || 'aud', 'fb-aud'];
  if (cat === 'doc')     return [e.slice(0,4) || 'doc', 'fb-doc'];
  // special
  if (['apk','ota'].includes(e)) return ['apk', 'fb-apk'];
  if (['deb','rpm','pkg','exe','msi'].includes(e)) return ['pkg', 'fb-arc'];
  if (['img','iso','bin','raw','dmg','rom'].includes(e)) return [e, 'fb-arc'];
  return [e.slice(0,4) || 'file', 'fb-def'];
};

const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let _tt;
function toast(msg, dur = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), dur);
}

// ── Easter eggs ────────────────────────────────────────────────────────────────
const EGGS = [
  "the cloud is just someone else's downloads folder",
  "your files are safe. probably.",
  "bandwidth consumed. regrets: none.",
  "S3 but worse",
  "works on my machine",
  "git blame: everyone else",
  "rm -rf /feelings",
  "no files were harmed in this serving",
  "it's not a bug, it's a feature nobody asked for",
  "have you tried turning it off and on again",
  "404: motivation not found",
  "technically correct — the best kind of correct",
  "there are 10 types of files: the ones you need and the ones that fill up your drive",
  "caffeine-driven development",
  "sudo make me a sandwich",
];

const sbEgg = document.getElementById('sb-egg');
let eggIdx = Math.floor(Math.random() * EGGS.length);

function showEgg() {
  sbEgg.classList.remove('visible');
  setTimeout(() => {
    sbEgg.textContent = EGGS[eggIdx++ % EGGS.length];
    sbEgg.classList.add('visible');
    setTimeout(() => sbEgg.classList.remove('visible'), 7000);
  }, 500);
}
// Show first egg after 4s, then every 20s
setTimeout(showEgg, 4000);
setInterval(showEgg, 20000);

// Konami code
const KONAMI = [38,38,40,40,37,39,37,39,66,65]; let _kb = [];
document.addEventListener('keydown', e => {
  _kb.push(e.keyCode); if (_kb.length > KONAMI.length) _kb.shift();
  if (JSON.stringify(_kb) === JSON.stringify(KONAMI)) {
    toast('+30 lives. they do nothing.', 4000);
    sbEgg.textContent = '+30 lives. they do nothing.';
    sbEgg.classList.add('visible');
    _kb = [];
  }
});

// Click egg 5 times for a secret
let eggClicks = 0, eggTimer;
sbEgg.addEventListener('click', () => {
  eggClicks++;
  clearTimeout(eggTimer);
  eggTimer = setTimeout(() => eggClicks = 0, 2000);
  if (eggClicks >= 5) {
    eggClicks = 0;
    sbEgg.textContent = '🐣 you found it. nice.';
    sbEgg.classList.add('visible');
    toast('easter egg unlocked', 3000);
  }
});

// ── Load ───────────────────────────────────────────────────────────────────────
async function load(path) {
  if (path !== undefined) _path = path;
  try {
    const url = '/files' + (_path ? '?path=' + encodeURIComponent(_path) : '');
    const [fr, fs] = await Promise.all([fetch(url), fetch('/session')]);
    if (fr.status === 401) { location.href = '/'; return; }
    const data = await fr.json();
    const sess = await fs.json();
    _all  = data.files || [];
    _dirs = data.dirs  || [];
    _isAdmin        = sess.admin || false;
    _canDelete      = sess.can_delete || false;
    _canWrite       = sess.can_write || false;
    _torrentEnabled = sess.torrent_enabled || false;
    _applyPerms();
  } catch { return; }
  buildBreadcrumb();
  buildCatTabs();
  buildSortMenu();
  render();
}

function _applyPerms() {
  // Show panel button if any action is available
  const hasActions = _canWrite || _torrentEnabled || _isAdmin;
  document.getElementById('panel-btn').style.display = hasActions ? '' : 'none';
  document.getElementById('sp-upload-section').style.display = _canWrite ? '' : 'none';
  document.getElementById('sp-torrent-section').style.display = _torrentEnabled ? '' : 'none';
  document.getElementById('sp-admin-section').style.display = _isAdmin ? '' : 'none';
  document.getElementById('table-wrap').classList.toggle('admin', _isAdmin || _canDelete);
  document.getElementById('torrent-toggle').classList.toggle('on', _torrentEnabled);
}

// ── Breadcrumb ────────────────────────────────────────────────────────────────
function buildBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!_path) { bc.innerHTML = ''; return; }
  const parts = _path.split('/').filter(Boolean);
  let html = `<button class="bc-item" onclick="load('')">~</button>`;
  parts.forEach((p, i) => {
    html += `<span class="bc-sep">/</span>`;
    const subPath = parts.slice(0, i+1).join('/');
    if (i === parts.length - 1) {
      html += `<span class="bc-item current">${esc(p)}</span>`;
    } else {
      html += `<button class="bc-item" onclick="load('${esc(subPath)}')">${esc(p)}</button>`;
    }
  });
  bc.innerHTML = html;
}

// ── Category tabs (grouped) ───────────────────────────────────────────────────
function buildCatTabs() {
  // Count files per category
  const counts = {};
  _all.forEach(f => {
    const c = catForFile(f.name);
    counts[c] = (counts[c] || 0) + 1;
  });

  let html = `<button class="ctab${_cat===null?' on':''}" onclick="setCat(null)">all <span class="n">${_all.length}</span></button>`;
  for (const cat of CATS) {
    if (!counts[cat.id]) continue;
    html += `<button class="ctab${_cat===cat.id?' on':''}" onclick="setCat('${cat.id}')">${cat.label} <span class="n">${counts[cat.id]}</span></button>`;
  }
  if (counts['other']) {
    html += `<button class="ctab${_cat==='other'?' on':''}" onclick="setCat('other')">other <span class="n">${counts['other']}</span></button>`;
  }
  document.getElementById('cattabs').innerHTML = html;
}

function setCat(c) { _cat = c; buildCatTabs(); render(); }

// ── Sort dropdown ─────────────────────────────────────────────────────────────
const SORT_OPTS = [
  { col: 'mtime', label: 'date' },
  { col: 'name',  label: 'name' },
  { col: 'size',  label: 'size' },
  { col: 'ext',   label: 'type' },
];

function buildSortMenu() {
  const dd = document.getElementById('sort-dropdown');
  dd.innerHTML = SORT_OPTS.map(o =>
    `<button class="sort-opt${_sort.col===o.col?' on':''}" onclick="setSort('${o.col}')">
      ${o.label}
      ${_sort.col===o.col ? `<span class="sort-dir">${_sort.dir>0?'↑':'↓'}</span>` : ''}
    </button>`
  ).join('');
  const cur = SORT_OPTS.find(o => o.col === _sort.col);
  document.getElementById('sort-label').textContent = (cur?.label || 'sort') + (_sort.dir > 0 ? ' ↑' : ' ↓');
}

function toggleSortMenu() {
  const dd = document.getElementById('sort-dropdown');
  const tog = document.getElementById('sort-toggle');
  const open = dd.classList.toggle('open');
  tog.classList.toggle('open', open);
  if (open) {
    const close = e => { if (!tog.contains(e.target) && !dd.contains(e.target)) { dd.classList.remove('open'); tog.classList.remove('open'); document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}

function setSort(col) {
  _sort = { col, dir: _sort.col === col ? -_sort.dir : -1 };
  document.getElementById('sort-dropdown').classList.remove('open');
  document.getElementById('sort-toggle').classList.remove('open');
  buildSortMenu();
  render();
}

// ── SVG icons ─────────────────────────────────────────────────────────────────
const COPY_SVG   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="1"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const DL_SVG     = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
const CHECK_SVG  = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const DEL_SVG    = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
const EDIT_SVG   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const FOLDER_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
const EMPTY_SVG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M8 12h8M12 8v8"/></svg>`;

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();

  let rows = _all.filter(f =>
    (_cat ? catForFile(f.name) === _cat : true) &&
    (!q || f.name.toLowerCase().includes(q))
  );

  const { col, dir } = _sort;
  rows.sort((a, b) => {
    let av, bv;
    if (col === 'ext') { av = gext(a.name); bv = gext(b.name); }
    else { av = a[col]; bv = b[col]; }
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    return av < bv ? -dir : av > bv ? dir : 0;
  });

  const total = _all.reduce((s, f) => s + f.size, 0);
  document.getElementById('sb-count').textContent = _all.length;
  document.getElementById('sb-size').textContent = fsize(total);
  const sw = document.getElementById('sb-shown-wrap');
  if (rows.length < _all.length) {
    sw.style.display = '';
    document.getElementById('sb-shown').textContent = rows.length;
  } else sw.style.display = 'none';

  const wrap = document.getElementById('rows');

  if (!_dirs.length && !rows.length) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${EMPTY_SVG}</div>
        <div class="empty-msg">${q ? 'no results for "' + esc(q) + '"' : 'no files yet'}</div>
      </div>`;
    return;
  }

  let html = '';
  if (!q) {
    _dirs.forEach(d => {
      const subPath = _path ? _path + '/' + d.name : d.name;
      html += `<div class="frow dir-row" onclick="load('${esc(subPath)}')">
        <div class="fname-cell">
          <div class="file-badge fb-dir">${FOLDER_SVG}</div>
          <div class="fname-info">
            <div class="fname-main">${esc(d.name)}</div>
            <div class="fname-sub">directory</div>
            <div class="fname-meta">${fdate(d.mtime)}</div>
          </div>
        </div>
        <div class="fsize">—</div>
        <div class="fdate">${fdate(d.mtime)}</div>
        <div class="fact"></div>
      </div>`;
    });
  }

  rows.forEach((f, i) => {
    const [label, cls] = badgeForFile(f.name);
    html += `<div class="frow">
      <div class="fname-cell">
        <div class="file-badge ${cls}">${label}</div>
        <div class="fname-info">
          <div class="fname-main" title="${esc(f.name)}">${esc(f.name)}</div>
          <div class="fname-sub">${esc(gext(f.name) ? '.' + gext(f.name) : '—')}</div>
          <div class="fname-meta">${fsize(f.size)} · ${fdate(f.mtime)}</div>
        </div>
      </div>
      <div class="fsize">${fsize(f.size)}</div>
      <div class="fdate">${fdate(f.mtime)}</div>
      <div class="fact">
        <button class="act-btn" id="cb${i}" onclick="copyLink('${esc(f.name)}','cb${i}')" title="Copy link">${COPY_SVG}</button>
        <button class="act-btn" id="db${i}" onclick="dlFile('${esc(f.name)}','db${i}')" title="Download">${DL_SVG}</button>
        ${_isAdmin ? `<button class="act-btn" onclick="openRename('${esc(f.name)}')" title="Rename">${EDIT_SVG}</button>` : ''}
        ${_canDelete ? `<button class="act-btn danger" id="xb${i}" onclick="delFile('${esc(f.name)}','xb${i}')" title="Delete">${DEL_SVG}</button>` : ''}
      </div>
    </div>`;
  });

  wrap.innerHTML = html;
}

document.getElementById('q').addEventListener('input', render);

// ── Side panel ────────────────────────────────────────────────────────────────
function openPanel() {
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('side-overlay').classList.add('open');
}
function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('side-overlay').classList.remove('open');
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function copyLink(name, id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  try {
    const r = await fetch('/token/' + encodeURIComponent(name));
    if (!r.ok) { toast('failed to get link'); return; }
    const { url } = await r.json();
    await navigator.clipboard.writeText(location.origin + url);
    btn.classList.add('ok'); btn.innerHTML = CHECK_SVG;
    toast('link copied');
    setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = COPY_SVG; }, 2500);
  } catch { toast('clipboard unavailable'); }
}

function dlFile(name, id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const a = document.createElement('a');
  a.href = '/dl/' + encodeURIComponent(name);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => {
    btn.classList.add('ok'); btn.innerHTML = CHECK_SVG;
    toast('downloading: ' + (name.length > 40 ? name.slice(0, 40) + '…' : name));
    setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = DL_SVG; }, 3000);
  }, 300);
}

function delFile(name, id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  if (!btn.classList.contains('armed')) {
    btn.classList.add('armed');
    toast('click again to confirm delete', 2500);
    setTimeout(() => btn.classList.remove('armed'), 3000);
    return;
  }
  btn.classList.remove('armed');
  fetch('/files/' + encodeURIComponent(name), { method: 'DELETE' })
    .then(async r => {
      if (r.ok) { toast('deleted: ' + (name.length > 40 ? name.slice(0, 40) + '…' : name)); load(); }
      else { const d = await r.json().catch(() => ({})); toast(d.error || 'delete failed'); }
    })
    .catch(() => toast('delete failed'));
}

// ── Rename ────────────────────────────────────────────────────────────────────
function openRename(name) {
  _renamingFile = name;
  const input = document.getElementById('rename-input');
  input.value = name;
  document.getElementById('rename-overlay').style.display = '';
  setTimeout(() => { input.focus(); input.select(); }, 50);
}
function closeRename() {
  _renamingFile = null;
  document.getElementById('rename-overlay').style.display = 'none';
}
async function submitRename() {
  const newName = document.getElementById('rename-input').value.trim();
  if (!newName || !_renamingFile) return;
  if (newName === _renamingFile) { closeRename(); return; }
  try {
    const r = await fetch('/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ old: _renamingFile, new: newName }),
    });
    const d = await r.json();
    if (r.ok) { toast('renamed to ' + newName); closeRename(); load(); }
    else toast(d.error || 'rename failed');
  } catch { toast('rename failed'); }
}
document.getElementById('rename-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitRename();
  if (e.key === 'Escape') closeRename();
});

// ── Upload ────────────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  uploadFiles(Array.from(e.target.files)); e.target.value = '';
});

const _drop = document.getElementById('upload-drop');
_drop.addEventListener('dragover',  e => { e.preventDefault(); _drop.classList.add('drag-over'); });
_drop.addEventListener('dragleave', () => _drop.classList.remove('drag-over'));
_drop.addEventListener('drop', e => {
  e.preventDefault(); _drop.classList.remove('drag-over');
  uploadFiles(Array.from(e.dataTransfer.files));
});

// Global drag-to-upload (opens panel)
document.addEventListener('dragover', e => {
  e.preventDefault();
  if (_canWrite) openPanel();
});

async function uploadFiles(files) {
  if (!files.length) return;
  const list = document.getElementById('upload-list');
  for (const file of files) {
    const item = document.createElement('div'); item.className = 'upload-item';
    const nameEl = document.createElement('div'); nameEl.className = 'upload-iname'; nameEl.textContent = file.name;
    const track  = document.createElement('div'); track.className = 'upload-track';
    const bar    = document.createElement('div'); bar.className = 'upload-bar';
    track.appendChild(bar);
    const meta = document.createElement('div'); meta.className = 'upload-imeta'; meta.textContent = fsize(file.size);
    item.append(nameEl, track, meta);
    list.appendChild(item);
    await new Promise(res => {
      const xhr = new XMLHttpRequest();
      xhr.upload.onprogress = e => {
        if (!e.lengthComputable) return;
        bar.style.width = (e.loaded / e.total * 100).toFixed(1) + '%';
        meta.textContent = fsize(e.loaded) + ' / ' + fsize(file.size);
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          bar.style.width = '100%'; meta.textContent = 'done'; load();
        } else {
          meta.textContent = 'failed (' + xhr.status + ')';
          bar.style.background = 'var(--red)';
        }
        res();
      };
      xhr.onerror = () => { meta.textContent = 'network error'; res(); };
      const form = new FormData(); form.append('file', file);
      xhr.open('POST', '/upload'); xhr.send(form);
    });
  }
}

// ── Torrent ───────────────────────────────────────────────────────────────────
async function submitTorrent() {
  const uri = document.getElementById('torrent-uri').value.trim();
  if (!uri) return;
  try {
    const r = await fetch('/torrent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uri }),
    });
    const d = await r.json();
    if (r.ok) { toast('torrent started', 3000); document.getElementById('torrent-uri').value = ''; }
    else toast(d.error || 'failed to start torrent');
  } catch { toast('network error'); }
}

// .torrent file drag/drop in side panel
const _tdrop = document.getElementById('torrent-file-drop');
_tdrop.addEventListener('dragover',  e => { e.preventDefault(); _tdrop.classList.add('drag-over'); });
_tdrop.addEventListener('dragleave', () => _tdrop.classList.remove('drag-over'));
_tdrop.addEventListener('drop', e => {
  e.preventDefault(); _tdrop.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) submitTorrentFile(file);
});
document.getElementById('torrent-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) submitTorrentFile(file);
  e.target.value = '';
});

async function submitTorrentFile(file) {
  if (!file.name.endsWith('.torrent')) { toast('not a .torrent file'); return; }
  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/torrent', { method: 'POST', body: form });
    const d = await r.json();
    if (r.ok) toast('torrent started', 3000);
    else toast(d.error || 'failed to start torrent');
  } catch { toast('network error'); }
}

// ── Admin ─────────────────────────────────────────────────────────────────────
async function toggleTorrentFlag() {
  const newVal = !_torrentEnabled;
  try {
    const r = await fetch('/flags', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ torrent_enabled: newVal }),
    });
    if (r.ok) {
      _torrentEnabled = newVal;
      document.getElementById('torrent-toggle').classList.toggle('on', newVal);
      document.getElementById('sp-torrent-section').style.display = newVal ? '' : 'none';
      _applyPerms();
      toast(newVal ? 'torrents enabled' : 'torrents disabled');
    }
  } catch { toast('failed to toggle'); }
}

// ── Logout ────────────────────────────────────────────────────────────────────
async function doLogout() {
  await fetch('/logout', { method: 'POST' });
  location.href = '/';
}

// ── Init ──────────────────────────────────────────────────────────────────────
load();
setInterval(() => load(), 30000);
</script>
